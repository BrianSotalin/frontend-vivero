<p-toast />
<p-confirmDialog />

<div class="container">
  <h2>
    <span class="material-icons">point_of_sale</span>
    Historial de Ventas
  </h2>

  <p-table
    #dt
    [value]="sales()"
    [paginator]="true"
    [rows]="10"
    [rowsPerPageOptions]="[5, 10, 20]"
    [globalFilterFields]="['codigo', 'cliente.nombre']"
    [tableStyle]="{ 'min-width': '55rem' }"
  >
    <ng-template pTemplate="caption">
      <div class="table-caption">
        <p-iconfield>
          <p-inputicon styleClass="pi pi-search" />
          <input
            pInputText
            type="text"
            (input)="dt.filterGlobal($any($event.target).value, 'contains')"
            placeholder="Buscar por comprobante o cliente..."
          />
        </p-iconfield>

        <p-button
          label="Nueva Venta"
          icon="pi pi-plus-circle"
          [routerLink]="['/ventas/nueva']"
          severity="secondary"
        />
      </div>
    </ng-template>

    <ng-template pTemplate="header">
      <tr>
        <th pSortableColumn="codigo">Comprobante <p-sortIcon field="codigo" /></th>
        <th pSortableColumn="fecha">Fecha / Hora <p-sortIcon field="fecha" /></th>
        <th>Cliente</th>
        <th pSortableColumn="total">Total <p-sortIcon field="total" /></th>
        <th pSortableColumn="estado">Estado <p-sortIcon field="estado" /></th>
        <th style="text-align: center">Acciones</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-venta>
      <tr>
        <td><span class="badge-code">{{ venta.codigo }}</span></td>
        <td>{{ venta.fecha | date:'dd/MM/yyyy HH:mm' }}</td>
        <td>{{ venta.cliente ? venta.cliente.nombre : 'Consumidor Final' }}</td>
        <td><b>${{ venta.total | number:'1.2-2' }}</b></td>
        <td>
          <p-tag
            [value]="textosEstado[venta.estado]"
            [severity]="severidadEstado[venta.estado]"
          />
        </td>
        <td style="text-align: center">
          <p-button
            icon="pi pi-eye"
            [rounded]="true"
            [text]="true"
            severity="secondary"
            [routerLink]="['/ventas/', venta.id]"
            title="Ver detalle"
          />
          <p-button
            icon="pi pi-trash"
            [rounded]="true"
            [text]="true"
            severity="danger"
            (click)="abrirConfirmacion(venta)"
            title="Eliminar"
          />
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="6" style="text-align: center">
          No se encontraron registros de ventas.
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
