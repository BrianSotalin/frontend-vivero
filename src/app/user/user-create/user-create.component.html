<div class="form-wrapper">
  <div class="form-card">
    <h2>
      Nuevo Usuario del Sistema
    </h2>
    
    <form #miFormulario="ngForm" (ngSubmit)="guardar(miFormulario)">
      
      <div class="input-group">
        <label for="username">Nombre de Usuario (Username)</label>
        <input 
          type="text" 
          id="username"
          [(ngModel)]="nuevoUsuario.username" 
          name="username" 
          required 
          minlength="4"
          #userInput="ngModel"
          placeholder="Ej. admin_vivero"
        />
        <div class="error-container" *ngIf="userInput.invalid && userInput.touched">
          <small *ngIf="userInput.errors?.['required']">El nombre de usuario es obligatorio.</small>
          <small *ngIf="userInput.errors?.['minlength']">Mínimo 4 caracteres.</small>
        </div>
      </div>
      
      <div class="input-group">
        <label for="password">Contraseña</label>
        <input 
          type="password" 
          id="password"
          [(ngModel)]="nuevoUsuario.password" 
          name="password" 
          required
          minlength="6"
          #passInput="ngModel"
          placeholder="Mínimo 6 caracteres"
        />
        <div class="error-container" *ngIf="passInput.invalid && passInput.touched">
          <small *ngIf="passInput.errors?.['required']">La contraseña es obligatoria.</small>
          <small *ngIf="passInput.errors?.['minlength']">Debe tener al menos 6 caracteres.</small>
        </div>
      </div>

      <div class="input-group">
        <label for="rol">Rol del Usuario</label>
        <select id="rol" [(ngModel)]="nuevoUsuario.rol" name="rol" class="custom-select">
          <option value="USER">Usuario Estándar (USER)</option>
          <option value="EMPLOYEE">Empleado/Trabajador (EMPLOYEE)</option>
          <option value="ADMIN">Administrador General (ADMIN)</option>
        </select>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn-save" [disabled]="miFormulario.invalid">
          Guardar Usuario
        </button>
        <button type="button" routerLink="/usuarios" class="btn-cancel">
          Cancelar
        </button>
      </div>

    </form>
  </div>
</div>
