<p-toast />

<div class="form-wrapper">
      <!-- Loading -->
  <div *ngIf="cargando()" class="loading-container">
    <span class="material-icons loading-spinner">cached</span>
    <p>Cargando información del usuario...</p>
  </div>
  <div class="form-card" *ngIf="!cargando()">
    <h2>
      <span class="material-icons">edit</span>
      Editar Credenciales
    </h2>

    <form #miFormulario="ngForm" (ngSubmit)="actualizar(miFormulario)">

      <div class="input-group">
        <label>Nombre de Usuario (No editable)</label>
        <input
          type="text"
          [value]="usuarioEnEdicion.username"
          disabled
          class="disabled-input"
        />
      </div>

<div class="input-group">
  <label for="password">Asignar Nueva Contraseña (Opcional)</label>
  <input
    type="password"
    id="password"
    [(ngModel)]="usuarioEnEdicion.password"
    name="password"
    #passInput="ngModel"
    placeholder="Dejar en blanco para no cambiarla"
  />
  <div class="password-rules" *ngIf="usuarioEnEdicion.password?.length > 0">
    <small [class.valid]="tieneLength()" [class.invalid]="!tieneLength()">
      <span class="pi" [class.pi-check]="tieneLength()" [class.pi-times]="!tieneLength()"></span>
      Mínimo 8 caracteres
    </small>
    <small [class.valid]="tieneMayuscula()" [class.invalid]="!tieneMayuscula()">
      <span class="pi" [class.pi-check]="tieneMayuscula()" [class.pi-times]="!tieneMayuscula()"></span>
      Una letra mayúscula
    </small>
    <small [class.valid]="tieneMinuscula()" [class.invalid]="!tieneMinuscula()">
      <span class="pi" [class.pi-check]="tieneMinuscula()" [class.pi-times]="!tieneMinuscula()"></span>
      Una letra minúscula
    </small>
    <small [class.valid]="tieneEspecial()" [class.invalid]="!tieneEspecial()">
      <span class="pi" [class.pi-check]="tieneEspecial()" [class.pi-times]="!tieneEspecial()"></span>
      Un carácter especial (!@#$...)
    </small>
  </div>
</div>

      <div class="input-group">
        <label for="rol">Cambiar Rol / Permisos</label>
        <select id="rol" [(ngModel)]="usuarioEnEdicion.rol" name="rol" class="custom-select">
          <option value="USER">Usuario Estándar (USER)</option>
          <option value="EMPLOYEE">Empleado/Trabajador (EMPLOYEE)</option>
          <option value="ADMIN">Administrador General (ADMIN)</option>
        </select>
      </div>

      <div class="form-actions">
        <p-button
          type="submit"
          label="Guardar Cambios"
          icon="pi pi-check"
          [disabled]="miFormulario.invalid || !passwordValida()"
          styleClass="btn-save-prime"
        />
        <p-button
          type="button"
          label="Cancelar"
          severity="secondary"
          routerLink="/usuarios"
          styleClass="btn-cancel-prime"
        />
      </div>

    </form>
  </div>
</div>
