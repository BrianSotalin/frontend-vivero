<p-toast />

<div class="form-wrapper">
      <!-- Loading -->
  <div *ngIf="cargando()" class="loading-container">
    <span class="material-icons loading-spinner">cached</span>
    <p>Cargando información del cliente...</p>
  </div>

  <div class="form-card" *ngIf="!cargando()">
    <h2>
      <span class="material-icons icono-editar">edit</span>
      Editar Cliente
    </h2>

    <form #miFormulario="ngForm" (ngSubmit)="actualizar(miFormulario)">

      <div class="input-group">
        <label for="nombre">Nombre Completo</label>
        <input
          type="text"
          id="nombre"
          [(ngModel)]="clienteEnEdicion.nombre"
          name="nombre"
          required
          minlength="3"
          #nomInput="ngModel"
          placeholder="Ej. Juan Pérez"
        />
        <span class="error-text" *ngIf="nomInput.invalid && nomInput.touched">
          <span *ngIf="nomInput.errors?.['required']">El nombre es obligatorio.</span>
          <span *ngIf="nomInput.errors?.['minlength']">Debe tener al menos 3 caracteres.</span>
        </span>
      </div>

      <div class="input-group">
        <label for="telefono">Teléfono</label>
        <input
          type="tel"
          id="telefono"
          [(ngModel)]="clienteEnEdicion.telefono"
          name="telefono"
          placeholder="Ej. 0998765432"
        />
      </div>

      <div class="input-group">
        <label for="email">Correo Electrónico</label>
        <input
          type="email"
          id="email"
          [(ngModel)]="clienteEnEdicion.email"
          name="email"
          email
          #emailInput="ngModel"
          placeholder="Ej. juan.perez@email.com"
        />
        <span class="error-text" *ngIf="emailInput.invalid && emailInput.touched">
          Formato de correo electrónico no válido.
        </span>
      </div>

      <div class="actions">
        <p-button
          type="submit"
          label="Guardar Cambios"
          icon="pi pi-check"
          [disabled]="miFormulario.invalid"
          styleClass="btn-save-prime"
        />
        <p-button
          type="button"
          label="Cancelar"
          severity="secondary"
          routerLink="/clientes"
          styleClass="btn-cancel-prime"
        />
      </div>

    </form>
  </div>
</div>
